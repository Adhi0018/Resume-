<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>


<style>
body
{
font-family: Verdana;
background-color: lightblue;
}

.form{
    width: 450px;
    margin: auto;
    background-color: white;
    padding: 20px;
    margin-top: 30px;
}

input,select{
    width: 100%;
    padding: 5px;
    margin-bottom: 10px;
}

button{
    padding: 8px;
    width: 100%;
}
</style>

<script>
function displayData(){
let fname = document.getElementById("fname").value;
let sname = document.getElementById("sname").value;
let mobile = document.getElementById("mobile").value;
let faname = document.getElementById("faname").value;
let maname = document.getElementById("maname").value;
let address = document.getElementById("address").value;
let percentage = document.getElementById("percentage").value;
let coursei = document.getElementById("coursei").value;
let course = document.getElementById("course").value;

let student = 
{
fname: fname,
sname: sname,
mobile: mobile,
faname: faname,
maname: maname,
address: address,
percentage: percentage,
coursei: coursei,
course: course
};

document.getElementById("output").innerHTML =
"First Name : " + student.fname + "<br>" +
"Second Name : " + student.sname + "<br>" +
"Mobile : " + student.mobile + "<br>" +
"Father Name : " + student.faname + "<br>" +
"Mother Name : " + student.maname + "<br>" +
"Address : " + student.address + "<br>" +
"12th Percentage : " + student.percentage + "<br>" +
"12th Course : " + student.coursei + "<br>" +
"Selected Course : " + student.course;
}
</script>

</head>
<body>

<div class="form">
<center>

<h2>Student Form</h2>
</center>

First Name:
<input type="text" id="fname">

Second Name:
<input type="text" id="sname">

Mobile Number:
<input type="number" id="mobile">

Father Name:
<input type="text" id="faname">

Mother Name:
<input type="text" id="maname">

Address:
<input type="text" id="address">

12th Percentage:
<input type="number" id="percentage">

Course Taken in 12th:
<select id="coursei">
<option>Bio-Math</option>
<option>Computer Science</option>
</select>

Course Willing To Take:
<select id="course">
<option>CSE</option>
<option>IT</option>
<option>AIDS</option>
<option>AIML</option>
<option>CSD</option>
</select>

<button onclick="displayData()">Submit</button>

<p id="output"></p>

</div>

</body>
</html>
