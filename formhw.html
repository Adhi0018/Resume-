<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<style>

body{
    font-family: Verdana;
    background-color: grey;
    margin: 20px;
}

.container{
    display: flex;
    gap: 20px;
}

.form{
    width: 30%;
    background-color: white;
    padding: 20px;
    border: 2px solid black;
}

.outputbox{
    width: 50%;
}

input,select{
    width: 100%;
    padding: 5px;
    margin-bottom: 10px;
    border: 1px solid black;
}

button{
    width: 100%;
    padding: 8px;
    border: 1px solid black;
}

table{
    width: 100%;
    border-collapse: collapse;
    background-color: white;
}

th,td{
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

th{
    background-color: black;
    color: white;
}

</style>

<script>

let students = [];

function displayData(){

let student = {
    fname : document.getElementById("fname").value,
    sname : document.getElementById("sname").value,
    mobile : document.getElementById("mobile").value,
    faname : document.getElementById("faname").value,
    maname : document.getElementById("maname").value,
    address : document.getElementById("address").value,
    percentage : document.getElementById("percentage").value,
    coursei : document.getElementById("coursei").value,
    course : document.getElementById("course").value
};

students.push(student);

let table = document.getElementById("studentTable");

table.innerHTML +=
"<tr>" +
"<td>" + student.fname + "</td>" +
"<td>" + student.sname + "</td>" +
"<td>" + student.mobile + "</td>" +
"<td>" + student.faname + "</td>" +
"<td>" + student.maname + "</td>" +
"<td>" + student.address + "</td>" +
"<td>" + student.percentage + "</td>" +
"<td>" + student.coursei + "</td>" +
"<td>" + student.course + "</td>" +
"</tr>";

console.log(students);

document.getElementById("fname").value = "";
document.getElementById("sname").value = "";
document.getElementById("mobile").value = "";
document.getElementById("faname").value = "";
document.getElementById("maname").value = "";
document.getElementById("address").value = "";
document.getElementById("percentage").value = "";

}

</script>

</head>

<body>

<div class="container">

<div class="form">

<center>
<h2>Student Form</h2>
</center>

First Name:
<input type="text" id="fname">

Second Name:
<input type="text" id="sname">

Mobile Number:
<input type="number" id="mobile">

Father Name:
<input type="text" id="faname">

Mother Name:
<input type="text" id="maname">

Address:
<input type="text" id="address">

12th Percentage:
<input type="number" id="percentage">

Course Taken in 12th:
<select id="coursei">
<option>Bio-Math</option>
<option>Computer Science</option>
</select>

Course Willing To Take:
<select id="course">
<option>CSE</option>
<option>IT</option>
<option>AIDS</option>
<option>AIML</option>
<option>CSD</option>
</select>

<br><br>

<button onclick="displayData()">Submit</button>

</div>

<div class="outputbox">

<center>
<h2>Records</h2>
</center>

<table id="studentTable">

<tr>
<th>First Name</th>
<th>Second Name</th>
<th>Mobile</th>
<th>Father Name</th>
<th>Mother Name</th>
<th>Address</th>
<th>12th %</th>
<th>12th Course</th>
<th>College Course</th>
</tr>

</table>

</div>

</div>

</body>
</html>
